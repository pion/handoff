<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8">
    <title>Handoff DataChannel Example</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem;
      }

      .panel {
        background-color: #f9f9f9;
        border: 1px solid #ccc;
        font-family: monospace;
        min-height: 9rem;
        overflow-y: auto;
        padding: 0.75rem;
      }

      p {
        margin: 0.25rem 0;
      }
    </style>
  </head>
  <body>
    <h1>Handoff DataChannel Example</h1>
    <p>
      Click Start to run two local browser RTCPeerConnections, or enable
      Override first to redirect the answerer API to the backend.
    </p>
    <label>
      <input id="overrideCheckbox" type="checkbox" onchange="toggleOverride()">
      Override
    </label>
    <button id="startButton" type="button" onclick="start()">Start</button>

    <h3>Peer Connection States</h3>
    <div id="connectionStates" class="panel"></div>

    <h3>Messages Sent by Offerer</h3>
    <div id="offerMessages" class="panel"></div>

    <h3>Messages Received by Answerer</h3>
    <div id="answerMessages" class="panel"></div>

    <script src="/handoff.js"></script>
    <script>
      const overrideCheckbox = document.getElementById('overrideCheckbox');

      function toggleOverride() {
        if (overrideCheckbox.checked) {
          logState('Override enabled: the answerer API will be redirected to the backend.');
          handoff.Start();

          return;
        }

        logState('Override disabled: the answerer API will no longer be redirected to the backend.');
        handoff.Stop();
      }

      // Bove is the only handoff-specific code in the page. Everything below
      // is standard WebRTC app code
      const connectionStates = document.getElementById('connectionStates');
      const offerMessages = document.getElementById('offerMessages');
      const answerMessages = document.getElementById('answerMessages');
      const startButton = document.getElementById('startButton');

      let offerer;
      let answerer;

      function addLine(container, text) {
        const line = document.createElement('p');
        line.textContent = text;
        container.appendChild(line);
      }

      function logState(text) {
        addLine(connectionStates, text);
      }

      function logConnectionState(name, peerConnection) {
        logState(`Peer Connection State has changed: ${peerConnection.connectionState} (${name})`);
      }

      function showAnswererMessages(dataChannel) {
        dataChannel.onopen = () => {
          logState('DataChannel opened (answerer)');
        };

        dataChannel.onmessage = messageEvent => {
          addLine(
            answerMessages,
            `${new Date().toLocaleTimeString()} - ${messageEvent.data}`,
          );
        };
      }

      function createOfferer() {
        const peerConnection = new RTCPeerConnection();
        const dataChannel = peerConnection.createDataChannel('data');

        peerConnection.onconnectionstatechange = () => {
          logConnectionState('offerer', peerConnection);
        };

        peerConnection.onicecandidate = ({ candidate }) => {
          if (!answerer || !candidate) {
            return;
          }

          answerer.addIceCandidate(candidate).catch(error => {
            logState(`Offerer ICE error: ${error.message}`);
          });
        };

        dataChannel.onopen = () => {
          logState('DataChannel opened (offerer)');
          window.setInterval(() => {
            const message = new Date().toString();
            addLine(offerMessages, `${new Date().toLocaleTimeString()} - ${message}`);
            dataChannel.send(message);
          }, 1000);
        };

        return peerConnection;
      }

      // Create the offerer before any override so it always stays in the browser.
      offerer = createOfferer();

      async function start() {
        try {
          answerer = new RTCPeerConnection();

          answerer.onconnectionstatechange = () => {
            logConnectionState('answerer', answerer);
          };
          answerer.ondatachannel = event => {
            showAnswererMessages(event.channel);
          };

          answerer.onicecandidate = ({ candidate }) => {
            if (!candidate) {
              return;
            }

            offerer.addIceCandidate(candidate).catch(error => {
              logState(`Answerer ICE error: ${error.message}`);
            });
          };

          const offer = await offerer.createOffer();
          await offerer.setLocalDescription(offer);
          await answerer.setRemoteDescription(offer);

          const answer = await answerer.createAnswer();
          await answerer.setLocalDescription(answer);
          await offerer.setRemoteDescription(answer);
        } catch (error) {
          logState(`Connection failed: ${error.message}`);
        }
      }
    </script>
  </body>
</html>
