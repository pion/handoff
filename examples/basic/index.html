<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8">
    <title>Handoff Basic Example</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem;
      }

      .panel {
        background-color: #f9f9f9;
        border: 1px solid #ccc;
        font-family: monospace;
        min-height: 9rem;
        overflow-y: auto;
        padding: 0.75rem;
      }

      p {
        margin: 0.25rem 0;
      }
    </style>
  </head>
  <body>
    <h1>Handoff Basic Example</h1>
    <p>
      Two local RTCPeerConnections establish a DataChannel and exchange the
      current time every second.
    </p>
    <button type="button" onclick="override(this)">Override</button>
    <button type="button" onclick="start(this)">Start</button>

    <h3>Peer Connection States</h3>
    <div id="connectionStates" class="panel"></div>

    <h3>Messages Received by Offerer</h3>
    <div id="offerMessages" class="panel"></div>

    <h3>Messages Received by Answerer</h3>
    <div id="answerMessages" class="panel"></div>

    <script>
      const connectionStates = document.getElementById('connectionStates');
      const offerMessages = document.getElementById('offerMessages');
      const answerMessages = document.getElementById('answerMessages');
      const offerer = new RTCPeerConnection();
      const offerChannel = offerer.createDataChannel('data');
      const peerConnectionIDs = new WeakMap();

      let answerer;

      function addLine(container, text) {
        const line = document.createElement('p');
        line.textContent = text;
        container.appendChild(line);
      }

      async function postEvent(event, data, id) {
        const payload = { event, data };
        if (id) {
          payload.id = id;
        }

        const response = await fetch('/handoff', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          throw new Error(`handoff request failed with status ${response.status}`);
        }

        if (response.status === 204) {
          return null;
        }

        return response.text();
      }

      function sendPeerConnectionEvent(pc, event, data) {
        const idPromise = peerConnectionIDs.get(pc);
        if (!idPromise) {
          return;
        }

        void idPromise
          .then(id => {
            if (!id) {
              return;
            }

            return postEvent(event, data, id);
          })
          .catch(() => {});
      }

      function wrapPeerConnection(pc, args) {
        if (peerConnectionIDs.has(pc)) {
          return pc;
        }

        peerConnectionIDs.set(
          pc,
          postEvent('new', args)
            .then(responseID => responseID || null)
            .catch(() => null),
        );

        for (const name of [
          'createDataChannel',
          'createOffer',
          'setLocalDescription',
          'setRemoteDescription',
          'createAnswer',
          'addIceCandidate',
        ]) {
          const original = pc[name].bind(pc);
          pc[name] = (...methodArgs) => {
            sendPeerConnectionEvent(pc, name, methodArgs);

            return original(...methodArgs);
          };
        }

        return pc;
      }

      function override(button) {
        button.disabled = true;
        const OriginalRTCPeerConnection = window.RTCPeerConnection;

        wrapPeerConnection(offerer, []);
        if (answerer) {
          wrapPeerConnection(answerer, []);
        }

        window.RTCPeerConnection = function(...args) {
          return wrapPeerConnection(new OriginalRTCPeerConnection(...args), args);
        };
      }

      offerer.onconnectionstatechange = () => {
        addLine(
          connectionStates,
          `Peer Connection State has changed: ${offerer.connectionState} (offerer)`,
        );
      };

      offerer.onicecandidate = event => {
        if (answerer && event.candidate) {
          answerer.addIceCandidate(event.candidate).catch(
            error => addLine(connectionStates, `Offerer ICE error: ${error.message}`),
          );
        }
      };

      offerChannel.onopen = () => {
        addLine(connectionStates, 'DataChannel opened (offerer)');
        window.setInterval(() => offerChannel.send(new Date().toString()), 1000);
      };

      offerChannel.onmessage = event => {
        addLine(offerMessages, `${new Date().toLocaleTimeString()} - ${event.data}`);
      };

      async function start(button) {
        button.disabled = true;

        try {
          answerer = new RTCPeerConnection();

          answerer.onconnectionstatechange = () => {
            addLine(
              connectionStates,
              `Peer Connection State has changed: ${answerer.connectionState} (answerer)`,
            );
          };

          offerer.onicecandidate = event => {
            if (event.candidate) {
              answerer.addIceCandidate(event.candidate).catch(
                error => addLine(connectionStates, `Offerer ICE error: ${error.message}`),
              );
            }
          };

          answerer.onicecandidate = event => {
            if (event.candidate) {
              offerer.addIceCandidate(event.candidate).catch(
                error => addLine(connectionStates, `Answerer ICE error: ${error.message}`),
              );
            }
          };

          answerer.ondatachannel = event => {
            const answerChannel = event.channel;

            answerChannel.onopen = () => {
              addLine(connectionStates, 'DataChannel opened (answerer)');
              window.setInterval(() => answerChannel.send(new Date().toString()), 1000);
            };

            answerChannel.onmessage = messageEvent => {
              addLine(
                answerMessages,
                `${new Date().toLocaleTimeString()} - ${messageEvent.data}`,
              );
            };
          };

          const offer = await offerer.createOffer();
          await offerer.setLocalDescription(offer);
          await answerer.setRemoteDescription(offer);

          const answer = await answerer.createAnswer();
          await answerer.setLocalDescription(answer);
          await offerer.setRemoteDescription(answer);
        } catch (error) {
          button.disabled = false;
          addLine(connectionStates, `Connection failed: ${error.message}`);
          postEvent('RTCPeerConnection.startError', [error.message]).catch(() => {});
        }
      }
    </script>
  </body>
</html>
